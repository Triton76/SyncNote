syntax = "proto3";

package syncnoterpc;

option go_package = "./syncnoterpc";

// ======================
// 消息定义
// ======================

message CreateNoteReq {
  string user_id = 1 [json_name = "userId"];
  string title = 2;
}

message NoteReq {
  string note_id = 1 [json_name = "noteId"];
}

message ApplyOpsReq {
  string note_id = 1 [json_name = "noteId"];
  string user_id = 2 [json_name = "userId"];
  repeated Operation ops = 3;
}

message Operation {
  string type = 1 [json_name = "type"];           // "insert" or "delete"
  string pos = 2 [json_name = "pos", optional];   // delete 时必需
  string char = 3 [json_name = "char", optional]; // insert 时必需（单字符）
}

message NoteResp {
  string note_id = 1 [json_name = "noteId"];
  string user_id = 2 [json_name = "userId"];
  string title = 3;
  string content = 4;
  int64 last_modified = 5 [json_name = "lastModified"];
}

message NoteSummary {
  string note_id = 1 [json_name = "noteId"];
  string title = 2;
  int64 last_modified = 3 [json_name = "lastModified"];
}

message UserNotesReq {
  string user_id = 1 [json_name = "userId"];
}

message UserNotesResp {
  repeated NoteSummary notes = 1;
}

message ApplyOpsResp {
  bool success = 1;
  string message = 2;
}

// ======================
// 服务定义
// ======================

service Syncnoterpc {
  rpc CreateNote(CreateNoteReq) returns (NoteResp);
  rpc GetNote(NoteReq) returns (NoteResp);
  rpc ApplyOps(ApplyOpsReq) returns (ApplyOpsResp);
  rpc GetUserNotes(UserNotesReq) returns (UserNotesResp);
}