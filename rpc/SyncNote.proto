syntax = "proto3";

package syncnoterpc;

option go_package = "./syncnoterpc";

// 编辑操作定义
message EditOperation {
    string op_type = 1 [json_name = "opType"];
    int32 start = 2;
    int32 end = 3;
    string content = 4;
}

// 笔记请求
message NoteReq {
    string id = 1;
    string user_id = 2;
    string content_type = 3 [json_name = "contentType"];
}

// 笔记响应
message NoteResp {
    string id = 1;
    string user_id = 2 [json_name = "userId"];
    string title = 3;
    string content = 4;
    string content_type = 5 [json_name = "contentType"];
    int64 timestamp = 6;
    int64 last_modified = 7 [json_name = "lastModified"];
}

// 创建笔记请求
message CreateNoteReq {
    string user_id = 1 [json_name = "userId"];
    string title = 2;
    string content = 3;
    string content_type = 4 [json_name = "contentType"];
}

// 笔记变更请求
message NoteChangeReq {
    string note_id = 1 [json_name = "noteId"];
    string user_id = 2 [json_name = "userId"];
    string section_id = 3 [json_name = "sectionId"];
    repeated EditOperation operations = 4;
    int64 timestamp = 5;
}

// 同步响应
message SyncResponse {
    bool success = 1;
    string message = 2;
    int64 timestamp = 3;
    string merged_content = 4 [json_name = "mergedContent"];
}

// 保存笔记请求（复用 NoteReq 即可）

// 获取用户笔记请求
message UserNotesReq {
    string user_id = 1 [json_name = "userId"];
}

// 获取用户笔记响应
message UserNotesResp {
    repeated NoteResp notes = 1;
}

// 服务定义
service Syncnoterpc {
    rpc CreateNote(CreateNoteReq) returns (NoteResp);
    rpc GetNote(NoteReq) returns (NoteResp);
    rpc SyncNoteChange(NoteChangeReq) returns (SyncResponse);
    rpc SaveNote(NoteReq) returns (NoteResp);
    rpc GetUserNotes(UserNotesReq) returns (UserNotesResp);
}